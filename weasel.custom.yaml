patch:
  style:
    # 主题设置
    color_scheme: win11light                       # 日间主题
    color_scheme_dark: win11dark                  # 夜间主题
    # 字体设置
    font_face: "霞鹜文楷"              # 全局字体
    label_font_face: "霞鹜文楷"        # 标签字体
    comment_font_face: "霞鹜文楷"      # 注释字体
    font_point: 13                                 # 全局字号
    label_font_point: 13                           # 标签字号
    comment_font_point: 0                         # 注释字号
    # 窗口设置
    fullscreen: false                              # 候选窗口全屏显示,true/false
    horizontal: true                               # 候选项横排,true/false
    vertical_text: false                           # 竖排文本,true/false
    vertical_text_left_to_right: true              # 竖排方向是否从左到右,true/false
    vertical_text_with_wrap: false                 # 文本竖排模式下，自动换行,true/false
    vertical_auto_reverse: false                   # 文本竖排模式下，候选窗口位于光标上方时倒序排列,true/false
    # 预编辑区
    inline_preedit: true                           # 是否在行内显示预编辑区,true/false
    preedit_type: composition                      # 预编辑区显示内容，composition（编码）；preview（高亮候选）；preview_all（全部候选）
    # 其他选项
    label_format: "%s"                             # 标签字符，例如 %s. 的效果为 1. 2. 3…..
    mark_text: ""                                  # 标记字符，显示在选中的候选标签前，需要在配色方案中指定颜色；如该项为空字符串 "" 而配色方案中 hilited_mark_color 非透明色，则显示 Windows 11 输入法风格标记
    ascii_tip_follow_cursor: false                 # 切换 ASCII 模式时，提示跟随鼠标，而非输入光标,true/false
    enhanced_position: false                       # 无法定位候选框时，在窗口左上角显示候选框,true/false
    display_tray_icon: false                       # 托盘显示独立于语言栏的额外图标,true/false
    antialias_mode: default                        # 次像素反锯齿设定，default；force_dword；cleartype；grayscale；aliased
    candidate_abbreviate_length: 0                 # 候选项略写，超过此数字则用省略号代替。设置为 0 则不启用此功能
    hover_type: none                               # 鼠标在候选窗口悬停时的动作，none（无动作）；hilite（选中鼠标下的候选）；semi_hilite（高亮鼠标下的候选）
    paging_on_scroll: true                         # 在候选窗口上滑动滚轮的行为：true（翻页）；false（选中下一个候选）
    click_to_capture: false                        # 鼠标点击候选项，创建截图
    # 布局
    layout:
      # baseline: 0                                  # 字号百分比
      # linespacing: 0                               # 字号百分比
      align_type: center                           # 标签、候选文字、注解文字之间的相对对齐方式
      max_height: 0                                # 候选框最大高度。超过设定值会尝试自动折叠，设置为 0 不启用此功能
      max_width: 0                                 # 候选框最大宽度。超过设定值会尝试自动折叠，设置为 0 不启用此功能
      # min_height: 0                                # 候选框最小高度
      min_width: 10                               # 候选框最小宽度
      # type: horizontal                             # 布局类型，功能近似 style 下的窗口控制选项，horizontal（横向）；vertical（竖直）; vertical_text（文本竖直）; vertical+fullscreen（竖向全屏）; horizontal+fullscreen（横向全拼）
      border_width: 2                              # 边框宽度，别名 border
      margin_x: 16                                 # 主体元素和候选框的左右、上下边距，为负值时，不显示候选框
      margin_y: 8
      spacing: 10                                  # inline_preedit 为 false 时，编码区域和候选区域的间距
      candidate_spacing: 12                        # 候选项之间的间距
      hilite_spacing: 6                            # 候选项和相应标签的间距，候选项与注解文字之间的距离
      hilite_padding_x: 2                          # 高亮区域和内部文字的左右间距，影响高亮区域大小
      hilite_padding_y: 2                          # 高亮区域和内部文字的上下间距，影响高亮区域大小
      shadow_offset_x: 4                           # 阴影绘制的偏离距离
      shadow_offset_y: 4
      shadow_radius: 8                             # 阴影区域半径，为 0 不显示阴影；需要同时在配色方案中指定非透明的阴影颜色
      corner_radius: 10                            # 候选窗口圆角半径
      round_corner: 4                              # 候选背景色块圆角半径，别名 hilited_corner_radius

  preset_color_schemes:
    poetry_spring:                                          
      name: 诗意之春／Poetry Spring         
      author: 空山明月<mrshiqiqi@126.com>
      text_color: 0x333333                          # 默认文字颜色
      comment_text_color: 0x333333                  # 注释文字颜色
      label_color: 0x333333                         # 标签文字颜色
      back_color: 0xe3fbe6                          # 候选窗背景色
      shadow_color: 0x66000000                      # 候选窗阴影色
      border_color: 0xe3fbe6                        # 候选窗边框颜色
      hilited_text_color: 0x333333                  # 编码文字颜色
      hilited_back_color: 0xd4d4d4                  # 编码背景颜色
      # hilited_shadow_color: 0x00000000            # 编码背景块阴影颜色
      hilited_candidate_text_color: 0xFFFFFF        # 高亮候选文字颜色
      hilited_candidate_back_color: 0x50AF4C        # 高亮候选背景颜色
      hilited_label_color: 0xFFFFFF                 # 高亮候选的标签颜色
      # hilited_mark_color: 0xFFFFFF                # 高亮候选前的标记颜色
      hilited_comment_text_color: 0xFFFFFF          # 高亮候选的注释颜色
      candidate_text_color: 0x333333                # 非高亮候选文字颜色
      candidate_back_color: 0xe3fbe6                # 非高亮候选背景颜色
      # candidate_shadow_color: 0x00000000          # 非高亮候选背景块阴影颜色
    Lumk_Light:
      name: "胖猫/Lumk"
      author: "胖猫<chubbycat@gmail.com>"
      back_color: 0xF9F9F9
      border_color: 0xE2E7F5
      candidate_text_color: 0x121212
      comment_text_color: 0x8E8E8E
      hilited_candidate_back_color: 0xECE4FC
      hilited_candidate_label_color: 0xB18FF4
      hilited_candidate_text_color: 0x7A40EC
      hilited_label_color: 0xA483EC
      hilited_mark_color: 0x7A40EC
      label_color: 0x888785
      text_color: 0x8100EB
      shadow_color: 0x20000000
    win11light:
      name: " Win11浅色 / Win11light"
      text_color: 0x191919
      label_color: 0x191919
      hilited_label_color: 0x191919
      back_color: 0xf9f9f9
      border_color: 0x009e5a00
      hilited_mark_color: 0xc06700
      hilited_candidate_back_color: 0xf0f0f0
      shadow_color: 0x20000000
    win11dark:
      name: "Win11暗色 / Win11Dark"
      text_color: 0xf9f9f9
      label_color: 0xf9f9f9
      back_color: 0x2C2C2C
      hilited_label_color: 0xf9f9f9
      border_color: 0x002C2C2C
      hilited_mark_color: 0xFFC24C
      hilited_candidate_back_color: 0x383838
      shadow_color: 0x20000000

  app_options:
    acad.exe:
      ascii_mode: true
    cmd.exe:
      ascii_mode: true
    SLDWORKS.exe:
      ascii_mode: true